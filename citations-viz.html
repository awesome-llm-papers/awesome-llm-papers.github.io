---
layout: default
title: Citation Graph of LLM Publications
description: A visualization of citation relationships between LLM papers
---

<h2>Citation Graph</h2>
<p>This interactive graph shows citation relationships between papers. Hover over a node to see details. Click to visit the paper’s page.</p>
<div style="text-align: right; margin-bottom: 10px;">
  <label>Search </label>
  <input type="text" spellcheck="false" id="filterCitationGraph"/>
  <button id="clearSearch">Clear</button>
</div>
<div id="citationGraphViz" style="width: 100%; height: 700px;"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
const width = document.getElementById('citationGraphViz').clientWidth;
const height = 700;

const svg = d3.select("#citationGraphViz").append("svg")
  .attr("width", width)
  .attr("height", height);

const tooltip = d3.select("#citationGraphViz")
  .append("div")
  .style("position", "absolute")
  .style("background", "#333")
  .style("color", "#fff")
  .style("padding", "10px")
  .style("border-radius", "8px")
  .style("opacity", 0);

let simulation = d3.forceSimulation()
  .force("link", d3.forceLink().id(d => d.id).distance(100))
  .force("charge", d3.forceManyBody().strength(-150))
  .force("center", d3.forceCenter(width / 2, height / 2));

d3.json("./citation_graph.json").then(function(graph) {
  const link = svg.append("g")
    .attr("stroke", "#aaa")
    .selectAll("line")
    .data(graph.links)
    .join("line")
    .attr("stroke-width", 1);

  const node = svg.append("g")
    .attr("stroke", "#fff")
    .attr("stroke-width", 1.5)
    .selectAll("circle")
    .data(graph.nodes)
    .join("circle")
    .attr("r", d => Math.sqrt(d.citations || 0) + 4)
    .attr("fill", d => d3.schemeCategory10[d.year % 10])
    .call(drag(simulation));

  node.on("mouseover", (event, d) => {
    tooltip.html(`<strong>${d.title}</strong><br>${d.year} – ${d.citations || 0} citations`)
      .style("left", (event.pageX + 10) + "px")
      .style("top", (event.pageY + 10) + "px")
      .transition().style("opacity", 1);
  }).on("mouseout", () => {
    tooltip.transition().style("opacity", 0);
  }).on("click", d => {
    window.location.href = `/publications/${d.id}/`;
  });

  simulation.nodes(graph.nodes).on("tick", () => {
    link
      .attr("x1", d => d.source.x)
      .attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x)
      .attr("y2", d => d.target.y);

    node
      .attr("cx", d => d.x)
      .attr("cy", d => d.y);
  });

  simulation.force("link").links(graph.links);

  d3.select("#clearSearch").on("click", () => {
    d3.select("#filterCitationGraph").property("value", "");
    node.style("opacity", 1);
    link.style("opacity", 1);
  });

  d3.select("#filterCitationGraph").on("keyup", function() {
    const term = this.value.toLowerCase();
    if (!term || term.length < 2) {
      node.style("opacity", 1);
      link.style("opacity", 1);
      return;
    }
    node.style("opacity", d => d.title.toLowerCase().includes(term) ? 1 : 0.1);
    link.style("opacity", d =>
      d.source.title.toLowerCase().includes(term) ||
      d.target.title.toLowerCase().includes(term) ? 1 : 0.05
    );
  });
});

function drag(simulation) {
  function dragstarted(event, d) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x;
    d.fy = d.y;
  }

  function dragged(event, d) {
    d.fx = event.x;
    d.fy = event.y;
  }

  function dragended(event, d) {
    if (!event.active) simulation.alphaTarget(0);
    d.fx = null;
    d.fy = null;
  }

  return d3.drag()
    .on("start", dragstarted)
    .on("drag", dragged)
    .on("end", dragended);
}
</script>
